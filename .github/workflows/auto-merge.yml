name: Auto-merge to main
on:
  push:
    branches: ["claude/*"]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "auto-merge"
  cancel-in-progress: true
jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Merge branch and push to main
        if: github.event_name == 'push'
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH into main..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git merge "origin/$BRANCH" --no-edit -m "Auto-merge $BRANCH into main"
          git push origin main
      - name: Re-checkout main after merge
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Trigger Vercel deploy via deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.AUTODEPLOY }}
        run: |
          mkdir -p /tmp/deploy-debug
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "AUTODEPLOY secret is NOT set" > /tmp/deploy-debug/result.txt
            echo "::error::AUTODEPLOY secret is NOT set"
            exit 1
          fi
          # Validate URL format
          if echo "$DEPLOY_HOOK" | grep -qE '^https://api\.vercel\.com/v1/integrations/deploy/'; then
            echo "url_format=VALID (Vercel deploy hook)" > /tmp/deploy-debug/result.txt
          else
            echo "url_format=INVALID" > /tmp/deploy-debug/result.txt
            echo "url_prefix=$(echo "$DEPLOY_HOOK" | head -c 40)..." >> /tmp/deploy-debug/result.txt
          fi
          echo "Triggering Vercel deploy hook..."
          HTTP_CODE=$(curl -s -o /tmp/deploy-debug/response.json -w "%{http_code}" -X POST "$DEPLOY_HOOK")
          echo "http_status=$HTTP_CODE" >> /tmp/deploy-debug/result.txt
          echo "response_body:" >> /tmp/deploy-debug/result.txt
          cat /tmp/deploy-debug/response.json >> /tmp/deploy-debug/result.txt
          echo "" >> /tmp/deploy-debug/result.txt
          cat /tmp/deploy-debug/result.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Deploy hook failed with HTTP $HTTP_CODE"
            exit 1
          fi
      - name: Commit deploy hook debug to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp /tmp/deploy-debug/result.txt ./deploy-debug.txt 2>/dev/null || echo "no debug output" > ./deploy-debug.txt
          git add deploy-debug.txt
          git commit -m "debug: deploy hook response [auto]" || true
          git push origin main || true
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
